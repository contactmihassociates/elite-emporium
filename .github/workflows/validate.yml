name: Validate site

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JavaScript syntax check
        run: |
          node --check script.js
          node --check sw.js
          if [ -f firebase-config.js ]; then node --check firebase-config.js; fi

      - name: JSON validity
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('app-build/twa-manifest.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.well-known/assetlinks.json','utf8'))"
          if [ -f firebase.json ]; then node -e "JSON.parse(require('fs').readFileSync('firebase.json','utf8'))"; fi

      - name: HTML basic validation
        run: |
          # Quick gate: every HTML file must reference styles.css and script.js
          # with the same cache-bust version (catches half-bumped deploys).
          BUSTS=$(grep -rh -oE "v=2026[0-9]+[a-z0-9]+" *.html | sort -u)
          COUNT=$(echo "$BUSTS" | wc -l)
          if [ "$COUNT" -gt 1 ]; then
            echo "::warning::Multiple cache-bust versions detected — likely a half-bumped deploy:"
            echo "$BUSTS"
          fi
          echo "Found versions:"
          echo "$BUSTS"

      - name: Single h1 per page
        run: |
          # Each public HTML page must have exactly one <h1> tag.
          # Multiple h1s confuse screen readers + Lighthouse; zero h1s
          # tank SEO. Regression check for iteration 11.
          FAIL=0
          for f in 404.html about.html cart.html collection.html index.html order-success.html orders.html privacy.html product.html products.html profile.html terms.html track-order.html wishlist.html; do
            if [ ! -f "$f" ]; then continue; fi
            N=$(grep -oE '<h1[ >]' "$f" | wc -l)
            if [ "$N" -ne 1 ]; then
              echo "::error::$f has $N <h1> tags (expected 1)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "h1 hierarchy: PASS"
          exit $FAIL

      - name: Every public HTML has favicon + meta description + lang en-IN
        run: |
          FAIL=0
          for f in 404.html about.html cart.html collection.html index.html order-success.html orders.html privacy.html product.html products.html profile.html terms.html track-order.html wishlist.html; do
            if [ ! -f "$f" ]; then continue; fi
            grep -q 'rel="icon"' "$f"            || { echo "::error::$f missing <link rel=icon>"; FAIL=1; }
            grep -q '<meta name="description"'  "$f" || { echo "::error::$f missing meta description"; FAIL=1; }
            grep -q 'lang="en-IN"'              "$f" || { echo "::error::$f missing lang=\"en-IN\""; FAIL=1; }
          done
          [ $FAIL -eq 0 ] && echo "head metadata: PASS"
          exit $FAIL

      - name: All scripts on HTML pages use defer
        run: |
          # Regression check for iteration 1. Any non-deferred external
          # script blocks rendering — verify all <script src=...> tags
          # have defer or async.
          FAIL=0
          for f in *.html; do
            if grep -qE '<script src="[^"]+"></script>' "$f"; then
              echo "::warning::$f has a non-deferred external <script src>"
            fi
          done
          echo "defer audit: complete"

      - name: Logo PNG is small (regression guard)
        run: |
          # logo-96.png powers all header logos. If it ever grows past
          # 30 KB, something's wrong (someone re-introduced the 2.4 MB
          # original).
          SIZE=$(wc -c < images/logo-96.png 2>/dev/null || echo 0)
          if [ "$SIZE" -gt 30000 ]; then
            echo "::error::images/logo-96.png is $SIZE bytes (expected <30KB)"
            exit 1
          fi
          echo "logo-96.png size: $SIZE bytes (PASS)"

      - name: All <button> tags have explicit type=
        run: |
          # Iteration 136 — iter 134 caught a real bug: <button class=
          # "sh-clear">Clear</button> was inside the header search form,
          # so clicking it was actually submitting the form (no type=
          # defaults to type="submit"). Iter 135 swept the remaining
          # 57. This gate locks the invariant: every <button> tag must
          # carry an explicit type= attribute.
          FAIL=0
          # Static HTML files
          for f in 404.html about.html cart.html collection.html hanii-dhanii.html index.html offline.html order-success.html orders.html privacy.html product.html products.html profile.html terms.html track-order.html wishlist.html; do
            if [ ! -f "$f" ]; then continue; fi
            # Find <button followed by anything that doesn't already include type=
            # (Python here is more reliable than grep regex for multiline lookahead)
            if python3 -c "
import re, sys, pathlib
txt = pathlib.Path('$f').read_text(encoding='utf-8')
bare = re.findall(r'<button\b(?![^>]*\btype=)[^>]*>', txt, re.DOTALL)
sys.exit(len(bare))
" 2>/dev/null; then
              :  # exit 0 → no bare buttons
            else
              N=$?
              echo "::error::$f has $N <button> tag(s) without type="
              FAIL=1
            fi
          done
          # script.js template strings
          if python3 -c "
import re, sys, pathlib
txt = pathlib.Path('script.js').read_text(encoding='utf-8')
bare = re.findall(r'<button\b(?![^>]*\btype=)[^>]*>', txt, re.DOTALL)
sys.exit(len(bare))
" 2>/dev/null; then
            :  # exit 0 → no bare buttons
          else
            N=$?
            echo "::error::script.js has $N <button> tag(s) without type= in template strings"
            FAIL=1
          fi
          [ $FAIL -eq 0 ] && echo "type=button coverage: PASS"
          exit $FAIL

      - name: Local image / favicon references resolve to real files
        run: |
          # Iteration 117 — scan every HTML page for src="images/..." and
          # href="images/..." references plus the bare favicon.ico path,
          # confirm each referenced file actually exists on disk. Catches
          # deleted assets, typo'd paths, and case-mismatches (some
          # filesystems care).
          FAIL=0
          for f in 404.html about.html cart.html collection.html hanii-dhanii.html index.html offline.html order-success.html orders.html privacy.html product.html products.html profile.html terms.html track-order.html wishlist.html; do
            if [ ! -f "$f" ]; then continue; fi
            # Extract images/<path> and favicon.ico references
            REFS=$(grep -oE '(src|href)="(images/[^"?]+|favicon\.ico)"' "$f" | sed -E 's/^(src|href)="([^"]+)"/\2/' | sort -u)
            for ref in $REFS; do
              # Strip query/hash if any
              path="${ref%%\?*}"
              path="${path%%#*}"
              if [ ! -f "$path" ]; then
                echo "::error::$f references missing asset: $path"
                FAIL=1
              fi
            done
          done
          [ $FAIL -eq 0 ] && echo "Asset reference integrity: PASS"
          exit $FAIL

      - name: Every public HTML has social cards + canonical
        run: |
          # Iteration 51 — enforce OG + Twitter card + canonical URL
          # on every customer-facing page so links shared on WhatsApp/
          # Twitter/FB always render a rich card.
          FAIL=0
          for f in 404.html about.html cart.html collection.html index.html order-success.html orders.html privacy.html product.html products.html profile.html terms.html track-order.html wishlist.html; do
            if [ ! -f "$f" ]; then continue; fi
            grep -q 'property="og:image"'      "$f" || { echo "::error::$f missing og:image"; FAIL=1; }
            grep -q 'property="og:url"'        "$f" || { echo "::error::$f missing og:url"; FAIL=1; }
            grep -q 'name="twitter:card"'      "$f" || { echo "::error::$f missing twitter:card"; FAIL=1; }
            grep -q 'rel="canonical"'          "$f" || { echo "::error::$f missing canonical"; FAIL=1; }
          done
          [ $FAIL -eq 0 ] && echo "social cards + canonical: PASS"
          exit $FAIL

      - name: Skip-link target exists (<main id="main">)
        run: |
          # Iteration 67 — caught products.html with href="#main" but no
          # <main id="main"> to land on. Keyboard users hitting Enter on
          # the skip-link went nowhere.
          FAIL=0
          for f in 404.html about.html cart.html collection.html index.html order-success.html orders.html privacy.html product.html products.html profile.html terms.html track-order.html wishlist.html; do
            if [ ! -f "$f" ]; then continue; fi
            if grep -q 'href="#main"' "$f"; then
              if ! grep -qE '<main[^>]*\bid="main"' "$f"; then
                echo "::error::$f has skip-link href=\"#main\" but no <main id=\"main\">"
                FAIL=1
              fi
            fi
          done
          [ $FAIL -eq 0 ] && echo "skip-link target: PASS"
          exit $FAIL

      - name: Every public HTML has noscript fallback
        run: |
          # Iteration 50 — without JS the storefront is blank. Every
          # page must show a friendly fallback explaining how to recover.
          FAIL=0
          for f in 404.html about.html cart.html collection.html index.html order-success.html orders.html privacy.html product.html products.html profile.html terms.html track-order.html wishlist.html; do
            if [ ! -f "$f" ]; then continue; fi
            grep -q '<noscript>' "$f" || { echo "::error::$f missing <noscript> fallback"; FAIL=1; }
          done
          [ $FAIL -eq 0 ] && echo "noscript fallback: PASS"
          exit $FAIL

      - name: No leftover dev secrets
        run: |
          # Fail if anyone accidentally commits a real Razorpay live key,
          # private firebase service account file, or the retired phone.
          if grep -rE "rzp_live_[A-Za-z0-9]{14}" --include="*.js" --include="*.html" . 2>/dev/null; then
            echo "::error::Razorpay LIVE key committed!"
            exit 1
          fi
          if grep -rE "8072173467|80721 73467|80721-73467" --include="*.html" --include="*.js" . 2>/dev/null; then
            echo "::error::Retired phone number found — should be removed."
            exit 1
          fi
          echo "Secret scan passed."

      - name: SW fallback page (offline.html) exists and is well-formed
        run: |
          # Iteration 109 — sw.js falls back to /offline.html when a
          # document request fails with no cached version. If this file
          # ever gets deleted, offline users see a useless empty response.
          if [ ! -f "offline.html" ]; then
            echo "::error::offline.html is missing — SW fallback chain broken"
            exit 1
          fi
          grep -q '<h1>' offline.html || { echo "::error::offline.html missing <h1>"; exit 1; }
          grep -q 'location.reload' offline.html || { echo "::error::offline.html missing reload button"; exit 1; }
          grep -q 'wa.me/917358650774' offline.html || { echo "::error::offline.html missing WA fallback link"; exit 1; }
          echo "offline.html: PASS"

      - name: Universal :focus-visible baseline exists
        run: |
          # Iteration 98 — established a universal :focus-visible rule
          # for button/a/input/select/textarea/summary etc. Regression
          # check: this rule must continue to exist in styles.css so
          # keyboard users always see a focus indicator even on classes
          # that have outline:none with no per-class focus replacement.
          if ! grep -q 'button:focus-visible' styles.css; then
            echo "::error::Universal :focus-visible baseline missing from styles.css"
            exit 1
          fi
          if ! grep -q 'input:focus-visible' styles.css; then
            echo "::error::Universal :focus-visible baseline missing input:focus-visible"
            exit 1
          fi
          echo "Universal :focus-visible baseline: PASS"

      - name: WhatsApp number is one of the known business numbers
        run: |
          # Iteration 61 — caught a fabricated number 918708276960 in the
          # noscript fallbacks. Allowlist the two known Elite Emporium
          # WhatsApp numbers (primary + alt). Anything else is a bug.
          OTHER=$(grep -rohE "wa\.me/91[0-9]{10}" --include="*.html" --include="*.js" . 2>/dev/null | sort -u | grep -vE "wa\.me/(917358650774|917358719774)" || true)
          if [ -n "$OTHER" ]; then
            echo "::error::Unknown WhatsApp number found (not primary nor alt):"
            echo "$OTHER"
            exit 1
          fi
          echo "WhatsApp number consistency: PASS"
