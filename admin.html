<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – Elite Emporium</title>

  <!-- Firebase SDKs (Auth + Firestore only — images via Cloudinary) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <!-- Cloudinary config -->
  <script>
    const CLOUDINARY_CLOUD  = 'dwygvtjad';
    const CLOUDINARY_PRESET = 'ml_default';
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #1a1a2e;
      --primary-dark: #0f0f1a;
      --gold:         #c9a84c;
      --gold-light:   #f5e6c8;
      --gold-dark:    #a0832f;
      --white:        #ffffff;
      --gray:         #6c757d;
      --light:        #f8f9fa;
      --red:          #e74c3c;
      --green:        #27ae60;
      --radius:       12px;
      --shadow:       0 4px 20px rgba(0,0,0,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--light);
      color: var(--primary);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ─────────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-logo {
      font-size: 42px;
      margin-bottom: 6px;
    }

    .login-card h1 {
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .login-card p {
      color: var(--gray);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--primary);
      background: var(--white);
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--gold);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: var(--red);
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
    }

    /* ── ADMIN PANEL ──────────────────────── */
    #adminPanel { display: none; }

    .admin-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .admin-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
    }

    .admin-header-left span:first-child { font-size: 24px; }

    .admin-header-left div h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
    }

    .admin-header-left div p {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .admin-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .admin-body { grid-template-columns: 1fr; }
    }

    /* ── CARDS ──────────────────────────── */
    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: var(--gold-light);
      padding: 16px 20px;
      border-bottom: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
    }

    .card-header span {
      font-size: 12px;
      color: var(--gray);
    }

    .card-body { padding: 20px; }

    /* ── IMAGE UPLOAD ───────────────────── */
    .image-upload-area {
      border: 2px dashed var(--gold);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      background: var(--gold-light);
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .image-upload-area:hover { background: #eedfc0; }

    .image-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-text { font-size: 14px; color: var(--primary); font-weight: 600; }
    .upload-sub  { font-size: 12px; color: var(--gray); margin-top: 4px; }

    #imagePreview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 8px;
      display: none;
    }

    /* ── PROGRESS BAR ───────────────────── */
    #uploadProgress {
      display: none;
      margin-top: 12px;
    }

    .progress-bar-wrap {
      background: #e0e0e0;
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-dark));
      border-radius: 10px;
      transition: width 0.3s;
      width: 0%;
    }

    .progress-label {
      font-size: 12px;
      color: var(--gray);
      margin-top: 4px;
      text-align: center;
    }

    /* ── PRODUCT LIST ───────────────────── */
    #productListContainer {
      max-height: 600px;
      overflow-y: auto;
    }

    .product-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    .product-item:last-child { border-bottom: none; }
    .product-item:hover { background: var(--light); }

    .product-item-img {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--gold-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .product-item-img img {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      object-fit: cover;
    }

    .product-item-info { flex: 1; min-width: 0; }

    .product-item-info .p-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-item-info .p-meta {
      font-size: 12px;
      color: var(--gray);
      margin-top: 2px;
    }

    .product-item-info .p-price {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold-dark);
      margin-top: 2px;
    }

    .btn-delete {
      background: none;
      border: 1px solid #ffcccc;
      color: var(--red);
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .btn-delete:hover { background: #ffeeee; }

    .empty-list {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
    }

    .empty-list .empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* ── TOAST ──────────────────────────── */
    #adminToast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.3s;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    #adminToast.show { transform: translateX(-50%) translateY(0); }
    #adminToast.success { background: var(--green); }
    #adminToast.error   { background: var(--red); }

    .badge-tag {
      display: inline-block;
      background: var(--gold-light);
      color: var(--gold-dark);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 4px;
    }

    .section-count {
      background: var(--gold);
      color: var(--white);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ──────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">👑</div>
    <h1>Elite Emporium</h1>
    <p>Admin Panel — Sign in to manage products</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-primary" id="loginBtn" onclick="signIn()">Sign In</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ── ADMIN PANEL ────────────────────────────────── -->
<div id="adminPanel">

  <div class="admin-header">
    <div class="admin-header-left">
      <span>👑</span>
      <div>
        <h2>Elite Emporium</h2>
        <p>Product Admin Panel</p>
      </div>
    </div>
    <button class="btn-logout" onclick="signOut()">Sign Out</button>
  </div>

  <div class="admin-body">

    <!-- ── ADD PRODUCT FORM ──── -->
    <div class="card">
      <div class="card-header">
        <h3>➕ Add New Product</h3>
      </div>
      <div class="card-body">

        <!-- Image Upload -->
        <div class="form-group">
          <label>Product Image *</label>
          <div class="image-upload-area" id="uploadArea">
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(this)" />
            <img id="imagePreview" src="" alt="Preview" />
            <div id="uploadPlaceholder">
              <div class="upload-icon">📸</div>
              <div class="upload-text">Tap to upload photo</div>
              <div class="upload-sub">JPG, PNG, WEBP — max 5 MB</div>
            </div>
          </div>
          <div id="uploadProgress">
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-label" id="progressLabel">Uploading…</div>
          </div>
        </div>

        <!-- Name -->
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="pName" placeholder="e.g. Silk Embroidered Saree" />
        </div>

        <!-- Price -->
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" id="pPrice" placeholder="e.g. 1500" min="1" />
        </div>

        <!-- Category -->
        <div class="form-group">
          <label>Category *</label>
          <select id="pCategory">
            <option value="">— Select Category —</option>
            <option value="Electronics">📱 Electronics</option>
            <option value="Clothing">👗 Clothing</option>
            <option value="Home & Kitchen">🏠 Home &amp; Kitchen</option>
            <option value="Footwear">👟 Footwear</option>
            <option value="Bags">👜 Bags</option>
            <option value="Toys & Games">🎮 Toys &amp; Games</option>
          </select>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label>Description *</label>
          <textarea id="pDesc" placeholder="Brief product description…"></textarea>
        </div>

        <!-- Badge (optional) -->
        <div class="form-group">
          <label>Badge (optional)</label>
          <select id="pBadge">
            <option value="">No badge</option>
            <option value="New">🆕 New</option>
            <option value="Bestseller">🔥 Bestseller</option>
            <option value="Popular">⭐ Popular</option>
            <option value="Premium">💎 Premium</option>
          </select>
        </div>

        <button class="btn-primary" id="addBtn" onclick="addProduct()">
          ➕ Add Product to Store
        </button>
      </div>
    </div>

    <!-- ── PRODUCTS LIST ──── -->
    <div class="card">
      <div class="card-header">
        <h3>🛍️ Products Added via Admin</h3>
        <span class="section-count" id="fbProductCount">0</span>
      </div>
      <div class="card-body" style="padding:0;">
        <div id="productListContainer">
          <div class="empty-list">
            <div class="empty-icon">📦</div>
            <p>No products added yet.</p>
            <p style="font-size:12px;margin-top:4px;">Products you add will appear here.</p>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /admin-body -->
</div><!-- /adminPanel -->

<div id="adminToast"></div>

<script>
  // ── FIREBASE INIT ──────────────────────────────
  let auth, db;

  function initFirebase() {
    if (!window.firebaseConfig || window.firebaseConfig.apiKey === 'YOUR_API_KEY') {
      document.getElementById('loginError').textContent =
        '⚠️ Firebase not configured yet. Please fill in firebase-config.js first.';
      document.getElementById('loginBtn').disabled = true;
      return false;
    }
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    auth = firebase.auth();
    db   = firebase.firestore();
    return true;
  }

  // ── AUTH STATE ─────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    if (!initFirebase()) return;

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginScreen').style.display  = 'none';
        document.getElementById('adminPanel').style.display   = 'block';
        loadFirebaseProducts();
      } else {
        document.getElementById('loginScreen').style.display  = 'flex';
        document.getElementById('adminPanel').style.display   = 'none';
      }
    });

    // Allow pressing Enter on password field to sign in
    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') signIn();
    });
  });

  // ── SIGN IN ────────────────────────────────────
  async function signIn() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please enter email and password.'; return; }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';

    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch (e) {
      errEl.textContent = '❌ Wrong email or password. Please try again.';
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  // ── SIGN OUT ───────────────────────────────────
  async function signOut() {
    await auth.signOut();
    toast('Signed out successfully.', 'success');
  }

  // ── IMAGE PREVIEW ──────────────────────────────
  function previewImage(input) {
    const file = input.files[0];
    if (!file) return;

    if (file.size > 5 * 1024 * 1024) {
      toast('Image too large. Max size is 5 MB.', 'error');
      input.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      const preview = document.getElementById('imagePreview');
      const ph      = document.getElementById('uploadPlaceholder');
      preview.src          = e.target.result;
      preview.style.display = 'block';
      ph.style.display      = 'none';
    };
    reader.readAsDataURL(file);
  }

  // ── ADD PRODUCT ────────────────────────────────
  async function addProduct() {
    const name     = document.getElementById('pName').value.trim();
    const price    = parseInt(document.getElementById('pPrice').value);
    const category = document.getElementById('pCategory').value;
    const desc     = document.getElementById('pDesc').value.trim();
    const badge    = document.getElementById('pBadge').value;
    const fileInput = document.getElementById('imageInput');
    const file     = fileInput.files[0];

    // Validate
    if (!name)     { toast('Please enter product name.', 'error');     return; }
    if (!price || price <= 0) { toast('Please enter a valid price.', 'error'); return; }
    if (!category) { toast('Please select a category.', 'error');      return; }
    if (!desc)     { toast('Please enter a description.', 'error');    return; }
    if (!file)     { toast('Please upload a product image.', 'error'); return; }

    const btn = document.getElementById('addBtn');
    btn.disabled    = true;
    btn.textContent = '⏳ Uploading image…';

    try {
      // 1 — Upload image to Cloudinary
      document.getElementById('uploadProgress').style.display = 'block';

      const imageUrl = await uploadToCloudinary(file, pct => {
        document.getElementById('progressFill').style.width  = pct + '%';
        document.getElementById('progressLabel').textContent = `Uploading… ${pct}%`;
      });

      // 2 — Save product to Firestore
      btn.textContent = '⏳ Saving product…';
      const productId = Date.now(); // numeric ID, won't clash with existing 1-15

      await db.collection('products').add({
        id:        productId,
        name,
        price,
        category,
        desc,
        badge:     badge || null,
        image:     imageUrl,
        rating:    4.5,
        reviews:   0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      toast(`✅ "${name}" added to store!`, 'success');
      resetForm();
      loadFirebaseProducts();

    } catch (err) {
      console.error(err);
      toast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = '➕ Add Product to Store';
      document.getElementById('uploadProgress').style.display = 'none';
    }
  }

  // ── LOAD FIREBASE PRODUCTS ─────────────────────
  async function loadFirebaseProducts() {
    const container = document.getElementById('productListContainer');
    const countEl   = document.getElementById('fbProductCount');

    try {
      const snap = await db.collection('products').orderBy('createdAt', 'desc').get();

      if (snap.empty) {
        container.innerHTML = `
          <div class="empty-list">
            <div class="empty-icon">📦</div>
            <p>No products added yet.</p>
            <p style="font-size:12px;margin-top:4px;">Products you add will appear here.</p>
          </div>`;
        countEl.textContent = '0';
        return;
      }

      countEl.textContent = snap.size;

      container.innerHTML = snap.docs.map(doc => {
        const p = doc.data();
        const imgHtml = p.image
          ? `<div class="product-item-img"><img src="${p.image}" alt="${p.name}" loading="lazy" /></div>`
          : `<div class="product-item-img">📦</div>`;

        const badgeHtml = p.badge ? `<span class="badge-tag">${p.badge}</span>` : '';

        return `
        <div class="product-item" id="item_${doc.id}">
          ${imgHtml}
          <div class="product-item-info">
            <div class="p-name">${p.name}${badgeHtml}</div>
            <div class="p-meta">${p.category}</div>
            <div class="p-price">₹${p.price.toLocaleString('en-IN')}</div>
          </div>
          <button class="btn-delete" onclick="deleteProduct('${doc.id}')">🗑️</button>
        </div>`;
      }).join('');

    } catch (err) {
      container.innerHTML = `<div class="empty-list"><p style="color:red;">Error loading products: ${err.message}</p></div>`;
    }
  }

  // ── CLOUDINARY UPLOAD ──────────────────────────
  function uploadToCloudinary(file, onProgress) {
    return new Promise((resolve, reject) => {
      const formData = new FormData();
      formData.append('file',           file);
      formData.append('upload_preset',  CLOUDINARY_PRESET);
      formData.append('folder',         'elite-emporium');

      const xhr = new XMLHttpRequest();
      xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
      };

      xhr.onload = () => {
        if (xhr.status === 200) {
          const res = JSON.parse(xhr.responseText);
          resolve(res.secure_url);
        } else {
          reject(new Error('Cloudinary upload failed: ' + xhr.statusText));
        }
      };

      xhr.onerror = () => reject(new Error('Network error during image upload.'));
      xhr.send(formData);
    });
  }

  // ── DELETE PRODUCT ─────────────────────────────
  async function deleteProduct(firestoreId) {
    if (!confirm('Delete this product from the store?')) return;

    try {
      await db.collection('products').doc(firestoreId).delete();

      const el = document.getElementById('item_' + firestoreId);
      if (el) el.remove();

      const countEl = document.getElementById('fbProductCount');
      countEl.textContent = Math.max(0, parseInt(countEl.textContent) - 1);

      toast('Product deleted.', 'success');

      const remaining = document.querySelectorAll('.product-item');
      if (remaining.length === 0) {
        document.getElementById('productListContainer').innerHTML = `
          <div class="empty-list">
            <div class="empty-icon">📦</div>
            <p>No products added yet.</p>
          </div>`;
      }
    } catch (err) {
      toast('Delete failed: ' + err.message, 'error');
    }
  }

  // ── RESET FORM ─────────────────────────────────
  function resetForm() {
    document.getElementById('pName').value     = '';
    document.getElementById('pPrice').value    = '';
    document.getElementById('pCategory').value = '';
    document.getElementById('pDesc').value     = '';
    document.getElementById('pBadge').value    = '';
    document.getElementById('imageInput').value = '';
    document.getElementById('imagePreview').style.display  = 'none';
    document.getElementById('uploadPlaceholder').style.display = 'flex';
    document.getElementById('progressFill').style.width = '0%';
  }

  // ── TOAST ──────────────────────────────────────
  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('adminToast');
    el.textContent = msg;
    el.className   = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }
</script>
</body>
</html>
